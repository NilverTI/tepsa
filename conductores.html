<style>
.conductores-hero {
  padding: 110px 10% 22px;
  text-align: center;
}
.conductores-hero h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #fff 0%, #ff2d2d 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.conductores-hero p { color: #666; font-size: 13px; }

.conductores-stats {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 16px 10% 0;
  flex-wrap: wrap;
}
.stat-card {
  background: #0f0f0f;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  padding: 8px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.stat-card .stat-icon { font-size: 14px; line-height: 1; }
.stat-card .stat-value { font-size: 15px; font-weight: 600; color: #fff; }
.stat-card .stat-label { font-size: 11px; color: #555; }

.conductores-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  padding: 18px 10% 0;
  max-width: 1400px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.search-wrapper { position: relative; flex: 1; min-width: 170px; max-width: 240px; }
.search-wrapper input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  background: #0f0f0f;
  border: 1px solid #1e1e1e;
  border-radius: 8px;
  color: #ddd;
  font-size: 13px;
  outline: none;
  transition: .2s;
}
.search-wrapper input:focus { border-color: #ff2d2d; box-shadow: 0 0 0 3px rgba(255,45,45,.08); }
.search-wrapper input::placeholder { color: #444; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #444; font-size: 13px; pointer-events: none; }

.filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-btn, .status-btn {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid #1e1e1e;
  color: #666;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: .2s;
  white-space: nowrap;
}
.filter-btn:hover, .status-btn:hover { border-color: #333; color: #aaa; }
.filter-btn.active { background: #ff2d2d; border-color: #ff2d2d; color: #fff; }
.status-btn.active { background: rgba(255,45,45,.08); border-color: #ff2d2d; color: #ff2d2d; }

.drivers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 12px;
  padding: 22px 10% 60px;
  max-width: 1400px;
  margin: 0 auto;
}

.driver-card {
  background: #0f0f0f;
  border: 1px solid #1c1c1c;
  border-radius: 10px;
  padding: 14px;
  transition: .25s;
}
.driver-card:hover {
  border-color: #ff2d2d33;
  background: #131313;
  box-shadow: 0 4px 20px rgba(255,45,45,.04);
}

.driver-card .card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.driver-card .driver-info {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.driver-card .driver-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  border: 1.5px solid #252525;
  background: linear-gradient(135deg, #1a1a1a, #242424);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: #ff2d2d;
}
.driver-card:hover .driver-avatar { border-color: #ff2d2d44; }
.driver-card .driver-avatar img { width: 100%; height: 100%; object-fit: cover; }
.driver-card .driver-meta { min-width: 0; }
.driver-card .driver-meta h3 {
  font-size: 14px;
  font-weight: 600;
  color: #f0f0f0;
  margin: 0;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.driver-card .driver-meta .driver-role { font-size: 11px; font-weight: 500; }
.driver-role[data-role="Conductor"] { color: #4ecdc4; }
.driver-role[data-role="Moderador"] { color: #4a9eff; }
.driver-role[data-role="Administrador"] { color: #ff2d2d; }
.driver-role[data-role="Owner"] {
  background: linear-gradient(135deg, #ffd93d, #ff6b35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.driver-card .driver-badges {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}
.driver-card .driver-rank {
  background: rgba(255,45,45,.07);
  border: 1px solid rgba(255,45,45,.15);
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  color: #ff2d2d;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.driver-card .driver-level {
  font-size: 10px;
  color: #ffd93d;
  font-weight: 600;
  background: rgba(255,217,61,.07);
  padding: 2px 7px;
  border-radius: 6px;
  border: 1px solid rgba(255,217,61,.12);
}

.driver-card .driver-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.driver-card .ds-item {
  background: rgba(255,255,255,.02);
  border: 1px solid #1a1a1a;
  border-radius: 7px;
  padding: 8px 4px;
  text-align: center;
}
.driver-card .ds-item .ds-value {
  font-size: 14px;
  font-weight: 700;
  color: #eee;
  line-height: 1.2;
}
.driver-card .ds-item .ds-label {
  font-size: 9px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: 2px;
}
.driver-card .ds-item.km .ds-value { color: #4ecdc4; }
.driver-card .ds-item.damage .ds-value { color: #ff6b6b; }
.driver-card .ds-item.points .ds-value { color: #ffd93d; }

.driver-card .card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 9px;
  border-top: 1px solid #181818;
}
.driver-card .last-job {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: #666;
}
.driver-card .last-job .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.driver-card .last-job .status-dot.active { background: #4ecdc4; box-shadow: 0 0 6px rgba(78,205,196,.25); }
.driver-card .last-job .status-dot.inactive { background: #555; }
.driver-card .last-job .status-dot.no-data { background: #333; }
.driver-card .driver-position { font-size: 11px; font-weight: 600; color: #444; }

.data-status { text-align: center; color: #555; font-size: 12px; padding: 0 10%; margin-top: -2px; }

.loading-spinner { text-align: center; padding: 60px 0; color: #555; grid-column: 1 / -1; }
.loading-spinner .spinner {
  width: 30px; height: 30px;
  border: 2px solid #1a1a1a;
  border-top-color: #ff2d2d;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.no-results { text-align: center; padding: 60px 0; color: #555; grid-column: 1 / -1; }
.no-results h3 { font-size: 17px; color: #888; margin-bottom: 6px; }
.no-results p { font-size: 13px; }

@media (max-width: 900px) {
  .drivers-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
}
@media (max-width: 700px) {

  .conductores-controls { flex-direction: column; align-items: stretch; }
  .search-wrapper { max-width: 100%; }
  .drivers-grid { padding: 16px 5% 40px; grid-template-columns: 1fr; }
}

<script>
const numberFormat = new Intl.NumberFormat("es-PE", { maximumFractionDigits: 0 });
let allDrivers = [];
let currentSort = "km";
let currentStatus = "all";
let searchTerm = "";

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatNumber(value) {
    return numberFormat.format(Number(value) || 0);
}

function getSortFn(sort) {
    switch (sort) {
        case "damage": return (a, b) => (a.damage || 0) - (b.damage || 0) || (b.kilometers || 0) - (a.kilometers || 0);
        case "points": return (a, b) => (b.points || 0) - (a.points || 0) || (b.kilometers || 0) - (a.kilometers || 0);
        case "name": return (a, b) => a.name.localeCompare(b.name);
        default: return (a, b) => (b.kilometers || 0) - (a.kilometers || 0) || (a.damage || 0) - (b.damage || 0);
    }
}

function getStatus(driver) {
    return Number(driver.lastJobDays) <= 7 ? "active" : "inactive";
}

function getStatusLabel(driver) {
    const days = Number(driver.lastJobDays);
    if (days === 0) return "Conectado ahora";
    if (days <= 7) return `Activo (${driver.lastJob})`;
    if (days === 9999) return "Sin actividad";
    return `Inactivo (${driver.lastJob})`;
}

function getStatusDotClass(driver) {
    const days = Number(driver.lastJobDays);
    if (days <= 7) return "active";
    if (days === 9999) return "no-data";
    return "inactive";
}

function getInitials(name) {
    const clean = String(name).replace(/\[.*?\]/g, '').trim();
    return clean.charAt(0).toUpperCase() || '?';
}

function renderStats(stats = {}) {
    const bar = document.getElementById("stats-bar");
    if (!bar) return;
    bar.innerHTML = `
        <div class="stat-card">
            <span class="stat-icon">&#x1F3CE;</span>
            <span class="stat-value">${formatNumber(stats.kilometers)}</span>
            <span class="stat-label">KM Totales</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">&#x1F465;</span>
            <span class="stat-value">${formatNumber(stats.drivers)}</span>
            <span class="stat-label">Miembros</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">&#x26A1;</span>
            <span class="stat-value">${formatNumber(stats.active)}</span>
            <span class="stat-label">Activos</span>
        </div>
    `;
}

function renderDrivers() {
    const grid = document.getElementById("drivers-grid");
    const statusEl = document.getElementById("data-status");
    if (!grid) return;

    let filtered = allDrivers;
    if (currentStatus !== "all") filtered = filtered.filter(d => getStatus(d) === currentStatus);
    if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(d =>
            d.name.toLowerCase().includes(term) ||
            d.role.toLowerCase().includes(term) ||
            d.rank.toLowerCase().includes(term)
        );
    }
    const sorted = [...filtered].sort(getSortFn(currentSort));

    if (!sorted.length) {
        grid.innerHTML = `<div class="no-results"><h3>Sin resultados</h3><p>No se encontraron conductores.</p></div>`;
        if (statusEl) statusEl.textContent = "0 conductores encontrados";
        return;
    }

    grid.innerHTML = sorted.map((driver, index) => {
        const pos = index + 1;
        const dotClass = getStatusDotClass(driver);
        const hasAvatar = driver.avatar && driver.avatar.startsWith("http");
        const avatarImg = hasAvatar
            ? `<img src="${escapeHtml(driver.avatar)}" alt="${escapeHtml(driver.name)}" loading="lazy" onerror="this.parentElement.innerHTML=this.parentElement.getAttribute('data-fallback')">`
            : '';
        const avatarContent = hasAvatar ? avatarImg : `${getInitials(driver.name)}`;

        return `
        <div class="driver-card">
            <div class="card-top">
                <div class="driver-info">
                    <div class="driver-avatar" data-fallback="${escapeHtml(getInitials(driver.name))}">${avatarContent}</div>
                    <div class="driver-meta">
                        <h3>${escapeHtml(driver.name)}</h3>
                        ${driver.role ? `<span class="driver-role" data-role="${escapeHtml(driver.role)}">${escapeHtml(driver.role)}</span>` : ''}
                        ${driver.country ? `<span class="driver-country">${escapeHtml(driver.country)}</span>` : ''}
                    </div>
                </div>
                <div class="driver-badges">
                    ${driver.rank ? `<span class="driver-rank">${escapeHtml(driver.rank)}</span>` : ''}
                    ${driver.level > 0 ? `<span class="driver-level">Nv. ${driver.level}</span>` : ''}
                </div>
            </div>
            <div class="driver-stats">
                <div class="ds-item km">
                    <div class="ds-value">${formatNumber(driver.kilometers)}</div>
                    <div class="ds-label">KM</div>
                </div>
                <div class="ds-item damage">
                    <div class="ds-value">${formatNumber(driver.damage)}</div>
                    <div class="ds-label">Daño</div>
                </div>
                <div class="ds-item points">
                    <div class="ds-value">${formatNumber(driver.points)}</div>
                    <div class="ds-label">Puntos</div>
                </div>
            </div>
            <div class="card-bottom">
                <div class="last-job">
                    <span class="status-dot ${dotClass}"></span>
                    <span>${escapeHtml(getStatusLabel(driver))}</span>
                </div>
                <div class="driver-position">#${pos}</div>
            </div>
        </div>`;
    }).join("");

    const sortLabel = { km: "kilometraje", damage: "menor daño", points: "puntos", name: "nombre" };
    if (statusEl) {
        const statusText = currentStatus === "all" ? "Todos" : currentStatus === "active" ? "Activos" : "Inactivos";
        statusEl.textContent = `${sorted.length} conductor(es) - Filtro: ${statusText} - Orden: ${sortLabel[currentSort] || "km"}`;
    }
}

const CACHE_KEY = "tepsa_conductores";
const CACHE_TTL = 30 * 60 * 1000;

function getCache() {
    try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const entry = JSON.parse(raw);
        if (Date.now() - entry.ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return null; }
        return entry.data;
    } catch { return null; }
}

function setCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch { }
}

function formatLastJob(days) {
    if (days == null || days === "") return "Sin registro";
    const n = Number(days);
    if (!Number.isFinite(n)) return "Sin registro";
    if (n === 0) return "hoy";
    if (n === 1) return "ayer";
    return `hace ${n} días`;
}

function transformTruckyMember(m) {
    const lastJobDays = m.last_job_days != null && Number.isFinite(Number(m.last_job_days))
        ? Number(m.last_job_days) : 9999;
    return {
        name: m.name || m.username || "Sin nombre",
        kilometers: Math.round(m.total_driven_distance_km || 0),
        damage: 0,
        totalJobs: 0,
        points: Math.round(m.points || 0),
        lastJob: formatLastJob(m.last_job_days),
        lastJobDays,
        rank: m.rank?.name || "",
        role: m.role?.name || "",
        avatar: m.avatar_url || "",
        level: m.level || 0,
        country: m.country || "",
        cargoMass: Math.round(m.total_cargo_mass_t || 0),
        revenue: Math.round(m.total_revenue || 0),
    };
}

function applyData(data, source) {
    allDrivers = data.ranking || [];
    renderStats(data.stats);
    renderDrivers();
    setCache(data);
    const statusEl = document.getElementById("data-status");
    if (statusEl) statusEl.textContent = `Trucky Hub · ${allDrivers.length} miembros · ${source}`;
}

async function tryFetch(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
}

async function fetchFresh() {
    const errors = [];
    for (const url of ["/api/trucky/conductores", "http://127.0.0.1:3001/api/trucky/conductores"]) {
        try { const d = await tryFetch(url); applyData(d, "Servidor"); return; } catch { errors.push(url); continue; }
    }
    try {
        const raw = await tryFetch("https://e.truckyapp.com/api/v1/company/44302/members");
        const members = raw.data || [];
        const ranking = members.map(transformTruckyMember).sort((a, b) => b.kilometers - a.kilometers);
        const totalKm = ranking.reduce((s, d) => s + d.kilometers, 0);
        const active = ranking.filter(d => d.lastJobDays <= 7).length;
        applyData({ ranking, stats: { kilometers: totalKm, drivers: ranking.length, active } }, "Trucky directo");
        return;
    } catch { errors.push("Trucky directo"); }
    throw new Error("Fallaron todos los orígenes: " + errors.join(", "));
}

async function loadData() {
    const cached = getCache();
    if (cached) {
        allDrivers = cached.ranking || [];
        renderStats(cached.stats);
        renderDrivers();
        document.getElementById("data-status").textContent = `Datos de caché · ${allDrivers.length} miembros`;
    }
    try {
        await fetchFresh();
    } catch {
        if (!cached) {
            allDrivers = [
                { name: "[TPS]SABROSAURIO", kilometers: 43400, damage: 3263, totalJobs: 78, points: 63897, lastJob: "hoy", lastJobDays: 0, rank: "Veterano", role: "Administrador", avatar: "", level: 8, country: "PE", cargoMass: 663, revenue: 34542506 },
                { name: "[TPS] Cristofer Jonathan QM", kilometers: 35229, damage: 3289, totalJobs: 51, points: 36230, lastJob: "ayer", lastJobDays: 1, rank: "Veterano", role: "Moderador", avatar: "", level: 6, country: "", cargoMass: 350, revenue: 28848413 },
                { name: "[TPS] Lexus", kilometers: 27203, damage: 16448, totalJobs: 27, points: 30305, lastJob: "ayer", lastJobDays: 1, rank: "Veterano", role: "Conductor", avatar: "", level: 6, country: "", cargoMass: 155, revenue: 13398366 },
                { name: "[TPS] Joker", kilometers: 26369, damage: 3355, totalJobs: 64, points: 41526, lastJob: "hace 3 días", lastJobDays: 3, rank: "Veterano", role: "Conductor", avatar: "", level: 6, country: "", cargoMass: 388, revenue: 27920645 },
